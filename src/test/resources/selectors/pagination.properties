# ============================================================
# Pagination selectors — validados com HTML real
# Paginação real: links com texto "Próxima »" e "« Anterior"
# Números de página: 1 2 3 4 5 como links simples
# %s = número da página substituído em runtime
# ============================================================

# Container
container=.page-numbers|.pagination|nav.navigation.posts-navigation

# Botão próxima/anterior — texto exato do HTML: "Próxima »" e "« Anterior"
next.button=a:has-text("Próxima »")|a.next|.nav-next a|a:has-text("Next")
prev.button=a:has-text("« Anterior")|a.prev|.nav-previous a|a:has-text("Previous")

# Página atual
current.page=span.current|.page-numbers.current|[aria-current="page"]

# Clique por número — %s substituído pelo número da página
page.number.click=.page-numbers a:has-text("%s")|.pagination a:has-text("%s")|nav.navigation a:has-text("%s")

# Títulos dos artigos na listagem
article.titles=article h3, article h2, .entry-title
