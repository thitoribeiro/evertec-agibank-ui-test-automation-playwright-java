# ============================================================
# Navigation selectors — validados com HTML real
# Tema Astra: menu usa  com  e
# %s = placeholder substituído em runtime pelo texto do item
# ============================================================

# Item de menu de primeiro nível
menu.item.wrapper=header ul li:has(> a:has-text("%s"))|nav ul li:has(> a:has-text("%s"))|.main-navigation li:has(> a:has-text("%s"))

# Submenu (primeiro nível de dropdown)
submenu=ul.sub-menu|ul.children|ul[class*="dropdown"]
submenu.items=ul.sub-menu > li > a|ul.children > li > a
submenu.visible=ul.sub-menu|ul.children

# Link de item do submenu para clique direto
submenu.item.link=ul.sub-menu a:has-text("%s")|header ul a:has-text("%s")|nav a:has-text("%s")

# Artigos na página de categoria
category.articles=article.ast-article-post|article.type-post|article
