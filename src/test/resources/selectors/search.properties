# ============================================================
# Search selectors — validados com HTML real
# O input de busca tem name="s" e placeholder="Pesquisar por:"
# ============================================================

# Input field — name="s" é o seletor mais estável
input=input[name="s"]|input[placeholder*="Pesquisar" i]|input[type="search"]|.search-field|#s

# Submit
submit.button=button:has-text("Pesquisar")|input[type="submit"]|.search-submit|button[type="submit"]

# Resultados
result.items=article.ast-article-post|article.type-post|article
result.titles=article h3 a|article h2 a|.entry-title a|h2.entry-title a

# Estado sem resultados
no.results=p:has-text("nenhum resultado")|.nothing-found|.no-results|p:has-text("Não encontramos")|:text("nenhum resultado encontrado")
