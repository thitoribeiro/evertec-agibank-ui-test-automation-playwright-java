# ============================================================
# Homepage selectors — validados com HTML real do blog.agibank.com.br
# Tema: Astra Child (WordPress)
# Separador de fallbacks: |
# ============================================================

# Logo / header
logo=a[href="https://blog.agibank.com.br/"]:has-text("Blog do Agi")|header .site-logo a|.custom-logo-link

# Ícone / botão de busca no header
search.icon=a:has-text("Pesquisar")|.ast-search-icon|button[class*="search"]|[aria-label*="search" i]

# Hero carousel — o blog usa h2 linkados como destaques principais
hero.carousel=main h2.entry-title|.wp-block-cover h2|main article:first-of-type h2
hero.read.more=a:has-text("Ler mais")|.wp-block-button a|main article:first-of-type a[class*="btn"]
hero.carousel.next=.swiper-button-next|.slick-next|button:has-text("›")|[class*="next"]

# Listagem de artigos (cards)
article.cards=article.ast-article-post|article.type-post|article
article.titles=article h3 a|article h2 a|.entry-title a
article.read.more=a:has-text("Ler texto")|a:has-text("Ler mais")

# Paginação
pagination.container=.page-numbers|.pagination|nav.navigation
pagination.next=a:has-text("Próxima »")|a.next|.nav-next a
pagination.prev=a:has-text("« Anterior")|a.prev|.nav-previous a
pagination.numbers=.page-numbers a:not(.next):not(.prev)

# Stories
stories.section=h2:has-text("Stories")|section:has(h2:has-text("Stories"))
stories.items=section:has(h2:has-text("Stories")) a|[class*="stories"] a
stories.see.more=a:has-text("Ver mais")
