# ============================================================
# Article page selectors — validados com HTML real
# Estrutura real:  título · Por autor | data · breadcrumb como  com links
# ============================================================

# Título — h1 direto, sem classes especiais no tema Astra
title=h1

# Autor e data estão juntos em .entry-meta ou parágrafo com "Por"
author=.entry-meta|p:has-text("Por ")|[class*="author"]|.posted-by
date=.entry-meta|p:has-text("|")|time|[class*="date"]|.posted-on

# Imagem destacada
featured.image=.entry-content img:first-child|article img:first-of-type|.wp-post-image

# Breadcrumb — no tema Astra é um parágrafo simples: Home - Categoria - Título
# NÃO usa classe .breadcrumb ou .breadcrumbs
breadcrumb=p:has(a[href*="blog.agibank.com.br"])|[class*="breadcrumb"]|nav[aria-label*="breadcrumb" i]
breadcrumb.items=p:has(a[href*="blog.agibank.com.br"]) a|[class*="breadcrumb"] a

# Conteúdo do artigo
content=.entry-content|article .entry-content|.post-content
